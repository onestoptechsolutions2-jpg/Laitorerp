services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: LeitorErp
      POSTGRES_USER: leitor_erp
      POSTGRES_PASSWORD: changeme
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - postgres
    environment:
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=LeitorErp;User ID=leitor_erp;Password=changeme;"
      App__SelfUrl: "http://localhost:8080"
    ports:
      - "8080:8080"

volumes:
  postgres-data:
